version: "3.8"

services:
  solarch:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - solarch_data:/app/pb_data
    environment:
      - SOLARCH_ENCRYPTION_KEY=${SOLARCH_ENCRYPTION_KEY:-}
      - JSVM_SANDBOX_MODE=${JSVM_SANDBOX_MODE:-legacy}
    restart: unless-stopped

volumes:
  solarch_data:

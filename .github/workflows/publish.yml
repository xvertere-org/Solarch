name: Publish to NPM and Homebrew

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          TARBALL_URL="https://registry.npmjs.org/solarch/-/solarch-${VERSION}.tgz"
          
          # Download tarball to compute sha256 checksum
          curl -sL -o solarch.tgz "$TARBALL_URL"
          SHA256=$(sha256sum solarch.tgz | awk '{print $1}')
          
          # Clone the homebrew-tap repo
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Jay-Suryawansh7/homebrew-tap.git
          cd homebrew-tap
          
          mkdir -p Formula
          
          # Create or update the solarch.rb formula
          cat <<EOF > Formula/solarch.rb
          class Solarch < Formula
            desc "TypeScript backend-as-a-service with SQLite, auth, realtime, and admin UI"
            homepage "https://github.com/Jay-Suryawansh7/Solarch"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args(keep_bin: true)
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              system "#{bin}/solarch", "--version"
            end
          end
          EOF
          
          # Commit and push updates to the tap repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/solarch.rb
          git commit -m "Update solarch to ${VERSION}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
